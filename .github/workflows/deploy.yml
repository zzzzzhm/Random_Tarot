name: Deploy to AWS EC2

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install backend dependencies
      run: |
        cd backend
        pip install -r requirements.txt
    
    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 backend/app --count --select=E9,F63,F7,F82 --show-source --statistics
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Docker images
      run: |
        docker build -t tarot-backend:latest ./backend
        docker build -t tarot-frontend:latest ./frontend
    
    - name: Log in to Docker Hub (可选)
      if: secrets.DOCKER_USERNAME != ''
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Push to Docker Hub
      if: secrets.DOCKER_USERNAME != ''
      run: |
        docker tag tarot-backend:latest ${{ secrets.DOCKER_USERNAME }}/tarot-backend:latest
        docker tag tarot-frontend:latest ${{ secrets.DOCKER_USERNAME }}/tarot-frontend:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/tarot-backend:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/tarot-frontend:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      if: secrets.EC2_HOST != ''
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd /home/${{ secrets.EC2_USER }}/tarot-project
          git pull origin main
          docker-compose pull
          docker-compose up -d
          docker-compose exec -T backend alembic upgrade head
          echo "✅ 部署完成"
