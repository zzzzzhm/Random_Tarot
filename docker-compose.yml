version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: random-tarot-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./tarot.db
      - DEBUG=true
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - tarot-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: random-tarot-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - tarot-network

  nginx:
    image: nginx:alpine
    container_name: random-tarot-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - tarot-network

networks:
  tarot-network:
    driver: bridge
